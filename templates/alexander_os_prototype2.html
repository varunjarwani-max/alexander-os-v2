<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexander OS // Kernel</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #08090a;
            --surface:  #0f1012;
            --border:   #1c1e22;
            --border2:  #252830;
            --gold:     #C9A84C;
            --gold-dim: #8a6f31;
            --slate:    #2A3555;
            --text:     #e8eaed;
            --muted:    #555b6b;
            --dim:      #2e3240;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; background: var(--bg); color: var(--text);
            font-family: 'DM Mono', monospace; overflow: hidden;
        }

        /* ── GRAIN OVERLAY ── */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.022; pointer-events: none; z-index: 9999;
        }

        /* ── LAYOUT ── */
        .shell {
            display: grid;
            grid-template-columns: 1fr 0fr; /* PDF hidden by default */
            grid-template-rows: 48px 1fr 80px;
            height: 100vh;
            transition: grid-template-columns 0.65s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .shell.pdf-open {
            grid-template-columns: 1fr 48%; /* Adjust width for iPad 10/11 proportions */
        }

        /* ── TOP BAR ── */
        .topbar {
            grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px; border-bottom: 1px solid var(--border); background: var(--bg); z-index: 10;
        }
        .logo-group { display: flex; align-items: center; gap: 14px; }
        .logo-mark {
            width: 26px; height: 26px; border: 1.5px solid var(--gold); border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-mark::after { content: 'Α'; font-family: 'Syne'; font-size: 13px; font-weight: 700; color: var(--gold); }
        .logo-text { font-family: 'Syne'; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; }
        .logo-text span { color: var(--muted); font-weight: 400; }

        .status-pill { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--muted); }
        .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: #3a7a3a; box-shadow: 0 0 6px #3a7a3a; animation: pulse 2.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .kernel-badge { font-size: 10px; color: var(--gold-dim); background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); padding: 3px 9px; border-radius: 3px; }
        .kernel-badge.stem { color: #5b9bd5; background: rgba(91,155,213,0.08); border-color: rgba(91,155,213,0.2); }

        /* ── CHAT ── */
        .chat-area { grid-column: 1; grid-row: 2; overflow-y: auto; padding: 32px 48px; display: flex; flex-direction: column; gap: 28px; }
        .msg { display: flex; flex-direction: column; gap: 6px; max-width: 820px; animation: fadeUp 0.4s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.user { align-self: flex-end; align-items: flex-end; }
        .msg.ai { align-self: flex-start; align-items: flex-start; }
        .msg-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }

        .bubble { padding: 16px 20px; border-radius: 12px; line-height: 1.7; font-size: 0.92rem; white-space: pre-wrap; word-break: break-word; }
        .msg.user .bubble { background: var(--slate); color: #c8d0e8; border-radius: 12px 12px 2px 12px; }
        .msg.ai .bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 12px 12px 12px 2px; }

        .source-cite {
            display: inline-flex; align-items: center; gap: 6px; font-size: 10px; color: var(--gold);
            background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25);
            padding: 6px 12px; border-radius: 6px; margin-top: 10px; cursor: pointer;
        }

        /* ── INPUT ── */
        .input-zone { padding: 0 48px 24px; display: flex; flex-direction: column; gap: 10px; }
        .input-bar { display: flex; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden; }
        .input-bar input { flex: 1; background: transparent; border: none; color: var(--text); padding: 18px 22px; outline: none; font-family: 'DM Mono'; font-size: 14px; }
        .send-btn { margin: 8px; background: var(--gold); color: #0a0a0a; border: none; padding: 0 24px; border-radius: 8px; cursor: pointer; font-family: 'Syne'; font-weight: 700; font-size: 11px; }

        /* ── PDF PANEL ── */
        .pdf-panel { 
            grid-column: 2; grid-row: 1 / -1; 
            border-left: 1px solid var(--border); background: #050607; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        .pdf-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 48px; border-bottom: 1px solid var(--border); }
        .pdf-frame { flex: 1; border: none; width: 100%; filter: invert(0.9) hue-rotate(180deg); }
        .close-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; cursor: pointer; border-radius: 4px; }

        .thinking { display: flex; gap: 6px; padding: 16px; background: var(--surface); border-radius: 12px; width: fit-content; }
        .thinking span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.4s infinite; }
        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.3; } 40% { transform: translateY(-5px); opacity: 1; } }
    </style>
</head>
<body>

<div class="shell" id="shell">
    <header class="topbar">
        <div class="logo-group">
            <div class="logo-mark"></div>
            <span class="logo-text">ALEXANDER OS <span>// KERNEL</span></span>
        </div>
        <div class="status-row" style="display:flex; gap:20px; align-items:center;">
            <div class="kernel-badge" id="kernel-badge">INITIALIZING...</div>
            <div class="status-pill"><div class="dot"></div>OFFLINE · ON-DEVICE</div>
        </div>
    </header>

    <main class="chat-area" id="chat">
        <div id="empty" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted);">
            <div style="font-family:'Syne'; font-size:90px; font-weight:800; color:var(--border2);">Α</div>
            <p style="text-align:center; font-size:12px; letter-spacing:0.1em; line-height:2;">OFFLINE TUTOR · PURE FOCUS<br>GROUNDED IN NCERT/GSEB</p>
        </div>
    </main>

    <footer class="input-zone">
        <div class="input-bar">
            <input type="text" id="prompt-input" placeholder="Query the kernel..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" id="send-btn" onclick="send()">Send</button>
        </div>
    </footer>

    <aside class="pdf-panel">
        <div class="pdf-header">
            <span id="pdf-label" style="font-size:10px; letter-spacing:0.1em; color:var(--muted);">MODULE_VIEWER</span>
            <button class="close-btn" onclick="closePdf()">✕</button>
        </div>
        <iframe class="pdf-frame" id="pdf-frame"></iframe>
    </aside>
</div>

<script>
    const shell = document.getElementById('shell');
    const chat = document.getElementById('chat');
    const input = document.getElementById('prompt-input');
    const sendBtn = document.getElementById('send-btn');
    const badge = document.getElementById('kernel-badge');
    const pdfFrame = document.getElementById('pdf-frame');
    const pdfLabel = document.getElementById('pdf-label');

    function updateBadge(text) {
        const isStem = /math|physics|solve|energy|newton|calculate|force/i.test(text);
        badge.textContent = isStem ? "STEM · QWEN 3" : "GENERAL · GEMMA 4";
        badge.className = isStem ? "kernel-badge stem" : "kernel-badge";
    }

    function openPdf(page) {
        if(!page) return;
        pdfLabel.textContent = `TEXTBOOK // PAGE ${page}`;
        // CRITICAL: Updated path to match Flask /static/ folder
        pdfFrame.src = `/static/physics_full_book.pdf#page=${page}`;
        shell.classList.add('pdf-open');
    }

    function closePdf() {
        shell.classList.remove('pdf-open');
    }

    function addMessage(role, text) {
        const empty = document.getElementById('empty');
        if(empty) empty.remove();

        const wrap = document.createElement('div');
        wrap.className = `msg ${role}`;
        wrap.innerHTML = `<div class="msg-label">${role === 'user' ? 'YOU' : 'ALEXANDER'}</div><div class="bubble">${text}</div>`;
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
        return wrap;
    }

    async function send() {
        const q = input.value.trim();
        if(!q) return;

        addMessage('user', q);
        updateBadge(q);
        input.value = '';

        const think = document.createElement('div');
        think.className = 'msg ai';
        think.innerHTML = `<div class="msg-label">ALEXANDER</div><div class="thinking"><span></span><span></span><span></span></div>`;
        chat.appendChild(think);
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: q})
            });

            think.remove();
            const aiMsg = addMessage('ai', '');
            const bubble = aiMsg.querySelector('.bubble');
            
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';
            let detectedPage = null;

            while(true) {
                const {done, value} = await reader.read();
                if(done) break;

                let chunk = decoder.decode(value);

                // Check for PDF tag in the stream
                const match = chunk.match(/\[SHOW_PDF:(\d+)\]/);
                if(match) {
                    detectedPage = match[1];
                    chunk = chunk.replace(/\[SHOW_PDF:\d+\]/, '');
                }

                fullText += chunk;
                bubble.textContent = fullText;
                chat.scrollTop = chat.scrollHeight;
            }

            // After streaming is done:
            if (window.MathJax) MathJax.typesetPromise([bubble]);

            if(detectedPage) {
                // 1. Create the citation button
                const cite = document.createElement('div');
                cite.className = 'source-cite';
                cite.innerHTML = `<span>⌘</span> Open Source: Page ${detectedPage}`;
                cite.onclick = () => openPdf(detectedPage);
                aiMsg.appendChild(cite);
                
                // 2. Automatically slide open the PDF panel
                setTimeout(() => openPdf(detectedPage), 600);
            }

        } catch (e) {
            if(think) think.remove();
            addMessage('ai', 'OFFLINE ERROR: Check if Ollama/Backend is active.');
        }
    }
</script>
</body>
</html>
